name: Update Instagram Stats

on:
  schedule:
    - cron: '0 0 * * *' # Ejecutar cada 24 horas (a la medianoche UTC)
  workflow_dispatch: # Permitir ejecución manual

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-size: '18'

      - name: Run metrics update script
        run: node update_stats.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git diff-index --quiet HEAD || (git commit -m "Auto-update Instagram stats [skip ci]" && git push)
